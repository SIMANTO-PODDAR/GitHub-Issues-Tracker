<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-In Github Issue Tracker</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="./img/github-logo.png" type="image/x-icon">

    <!-- daisyui & tailwindcss link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="max-w-[1600px] mx-auto">

    <main>
        <section id="signIn" class="min-h-screen flex  items-center justify-center "> <!-- Sign in Section -->

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-[450px] border p-4 grid gap-3.5 shadow-md">
                <div class="img-text-div flex flex-col items-center">
                    <div>
                        <img class="h-[100px] w-[100px]" src="./img/github-logo.png" alt="github-logo">
                    </div>
                    <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                    <p>Sign in to manage your issues</p>
                </div>

                <label class="label font-black text-[14px]">Username</label>
                <input id="login-name" type="text" class="input w-full" placeholder="Enter Username" />

                <label class="label font-black text-[14px]">Password</label>
                <input id="login-pas" type="password" class="input w-full" placeholder="Enter Password" />

                <button class="btn btn-active btn-primary" onclick="validation()">Sign In</button>
                <div class="divider">OR</div>
                <div class="text-center">
                    <p class="text-[12px]">Demo Credentials:</p>
                    <div class="mt-2.5 text-[15px]">
                        <h1><span class="font-bold">Username:</span> admin</h1>
                        <h1><span class="font-bold">Password:</span> admin123</h1>
                    </div>
                </div>
            </fieldset>

        </section> <!-- END Sign in Section -->
    </main>

    <!-- JS link  -->
    <script src="./sign-in.js"></script>

</body>

</html>
