<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="./img/github-logo.png" type="image/x-icon">

    <!-- daisyui & tailwindcss link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body class="max-w-[1600px] mx-auto">

    <main>

        <section id="app-section"> <!-- Main App -->

            <nav class="flex justify-between p-2.5 bg-amber-50 rounded-2xl"> <!-- Nav Section -->
                <div class=" flex align-middle">
                    <img class="h-9 w-9" src="./img/github-logo.png" alt="github-logo">
                    <h1 class="text-2xl font-bold ml-1">GitHub Issues Tracker</h1>
                </div>

                <div class="flex">
                    <label class="input mr-1.5">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                    <button class="btn rounded-[5px] btn-primary">+ New Issue</button>
                </div>
                </div>

            </nav><!-- END Nav Section -->


            <section class="max-w-[1400px] mx-auto"> <!-- Formatting Section-->

                <section class="mt-[50px] flex gap-2 bg-amber-50 p-6 rounded-2xl"> <!-- Button Section -->

                    <button onclick="filter('btn-all'  , 'all-issue-p')" id="btn-all"
                        class="btn w-[120px] btn-primary">All</button>
                    <button onclick="filter('btn-open' , 'open-issue-p')" id="btn-open"
                        class="btn w-[120px]">Open</button>
                    <button onclick="filter('btn-closed' , 'closed-issue-p')" id="btn-closed"
                        class="btn w-[120px]">Closed</button>
                </section> <!-- END Button Section -->

                <section class="mt-5 bg-amber-50 rounded-2xl p-6">
                    <!-- All Issues Section -->

                    <section id="loading-spinner" class="hidden items-center justify-center"> <!-- loading-spinner -->
                        <span class="loading loading-spinner loading-xl"></span>
                    </section>

                    <section class="flex justify-between items-center "> <!-- Issue Top Bar-->


                        <div class="flex items-center"> <!-- Top Bar Icon & Txt -->
                            <div class=" w-10 h-10 bg-pink-200 rounded-full flex items-center justify-center "> <img
                                    class="w-8 h-8" src="./img/Aperture.png" alt=""></div>

                            <div class="ml-2">
                                <h1 class="text-xl font-bold"> <span id="top-bar-counter">00</span> Issues</h1>
                                <p>Track and manage your project issues</p>
                            </div>

                        </div><!-- END Top Bar Icon & Txt -->

                        <div class="flex font-bold"> <!-- Top Status -->
                            <div class="flex mr-1.5"><i
                                    class="fa-solid fa-circle text-[10px] pt-1 m-1 text-green-500"></i>
                                <p>Open</p>
                            </div>

                            <div class="flex"><i class="fa-solid fa-circle text-[10px] pt-1 m-1 text-fuchsia-800"></i>
                                <p>Closed</p>
                            </div>
                        </div> <!-- END Top Status -->

                    </section><!-- END Issue Top Bar-->

                    <div class="divider"></div>


                    <div id="all-issue-p"
                        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-y-6 justify-items-center">
                        <!-- All Issue Cards-->

                    </div> <!-- END All Issue Cards-->


                    <div id="open-issue-p"
                        class="grid hidden grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-y-6 justify-items-center">
                        <!-- Open Issue Cards-->

                    </div> <!-- END Open Issue Cards-->


                    <div id="closed-issue-p"
                        class="grid hidden grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-y-6 justify-items-center">
                        <!-- Closed Issue Cards-->

                    </div> <!-- END Closed Issue Cards-->


                </section> <!-- END All Issues Section -->



            </section> <!-- END Formatting Section-->
        </section> <!-- END Main App -->
    </main>

    <section id="modal">
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn" onclick="my_modal_1.showModal()">open modal</button>
        <dialog id="my_modal_1" class="modal">
            <div class="modal-box">
                <h3 class="text-lg font-bold">Hello! This modal works with a hidden checkbox!</h3>
                <div class="flex">
                    <div class="w-24 mr-2 flex justify-center items-center bg-emerald-300 rounded-2xl">Status</div>
                    <p>
                        <span class="rounded-full text-[6px]"><i class="fa-solid fa-circle mx-2"></i></span>
                        Opened by
                        Name
                        <span class="rounded-full text-[6px]"><i class="fa-solid fa-circle mx-2"></i></span>
                        Date
                    </p>
                </div>
                <div class="my-1.5 pt-1.5 flex mt-7">
                    <div class="flex p-1 ml-1 bg-red-100 text-red-700
                        outline-red-500 rounded-2xl w-16 items-center justify-center outline-1 ">
                        <i class=" fa-solid fa-bug"></i>
                        <p class="text-[12px]">BUG</p>
                    </div>

                    <div class="flex p-1 ml-1 bg-yellow-100
                        text-yellow-700 outline-yellow-500 rounded-2xl w-40 outline-1  items-center justify-center">
                        <i class="fa-solid fa-life-ring"></i>
                        <p class="text-[12px]">HELP WANTED</p>
                    </div>
                </div>
                <p class="py-4">This modal works with a hidden checkbox!</p>
                <div class="p-3 bg-sky-300/30 flex justify-around rounded-2xl">
                    <div>Assignee: <br> <span>Name</span></div>
                    <div>Priority: <br> <span class="w-20 h-6 pl-1.5 bg-yellow-200 rounded-2xl">issue.priority</span>
                    </div>
                </div>
                <form method="dialog" class=" flex justify-end mt-3.5">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </dialog>
    </section>
    <!-- script -->
    <script>

    </script>

    <!-- JS link  -->
    <script src="./script.js"></script>
</body>

</html>
